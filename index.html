<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no" />
  <title>12thFailJobs</title>
  <link rel="stylesheet" href="styles-new.css" />

  <!-- Language System -->
  <script defer src="js/i18n.js"></script>

  <style>
    /* Override inline styles to use main CSS properly */
    .wrap { 
      max-width: 1200px !important; 
      margin: 0 auto !important; 
      padding: 20px !important;
    }
    .hero {
      background: var(--glass-bg) !important;
      backdrop-filter: blur(12px) !important;
      color: var(--text) !important;
      border-radius: 50px !important;
      padding: 20px 40px !important;
      text-align: center !important;
      margin: 0 auto !important;
      width: fit-content !important;
      display: block !important;
    }
    .hero h1 {
      font-size: 6.5rem !important;
      color: var(--primary) !important;
      margin-bottom: 15px !important;
    }
    .hero p {
      color: var(--text-muted) !important;
      margin-bottom: 20px !important;
    }
    .card {
      background: var(--glass-bg) !important;
      backdrop-filter: blur(12px) !important;
      border: var(--glass-border) !important;
      border-radius: var(--radius) !important;
      box-shadow: var(--glass-shadow) !important;
      color: var(--text) !important;
    }
    .bigcard {
      background: var(--glass-bg) !important;
      backdrop-filter: blur(12px) !important;
      border: var(--glass-border) !important;
      border-radius: var(--radius) !important;
      box-shadow: var(--glass-shadow) !important;
      color: var(--text) !important;
      transition: transform 0.3s ease !important;
    }
    .bigcard:hover {
      transform: translateY(-5px) !important;
      background: var(--glass-bg-hover) !important;
    }
    .tag {
      background: rgba(0, 78, 146, 0.15) !important;
      color: var(--primary) !important;
    }
    .langcard {
      background: var(--glass-bg) !important;
      backdrop-filter: blur(12px) !important;
      border: var(--glass-border) !important;
      border-radius: var(--radius) !important;
      box-shadow: var(--glass-shadow) !important;
      color: var(--text) !important;
    }
    /* Ensure navigation works */
    .site-header {
      position: sticky !important;
      top: 0 !important;
      z-index: 1000 !important;
      background: var(--glass-bg) !important;
      backdrop-filter: blur(3px) !important;
      border-bottom: var(--glass-border) !important;
      box-shadow: var(--glass-shadow) !important;
    }
    .nav-menu a {
      color: var(--text) !important;
      font-weight: 600 !important;
      text-decoration: none !important;
    }
    .nav-menu a:hover {
      color: var(--accent) !important;
      background: rgba(255, 140, 0, 0.1) !important;
    }

    /* Language Dropdown */
    .lang-box{
      margin-top:20px;
      display:flex;
      justify-content:center;
    }

    .lang-box select{
      padding:12px 22px;
      border-radius:40px;
      border:1px solid rgba(255,255,255,0.2);
      background:rgba(255,255,255,0.15);
      backdrop-filter:blur(15px);
      color:#000;
      font-weight:700;
      cursor:pointer;
    }

    .lang-box select option{
      background:#fff;
      color:#000;
    }

    .section-title{
      text-align:center;
      margin:40px 0 30px;
      font-size:2rem;
    }

    .role-cards{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:20px;
    }

    .role-card{
      padding:20px;
      border-radius:16px;
      text-decoration:none;
      background:var(--glass-bg);
      backdrop-filter:blur(10px);
      box-shadow:var(--glass-shadow);
      color:var(--text);
    }

    .role-features{
      margin-top:10px;
      display:flex;
      flex-direction:column;
      gap:5px;
    }
  </style>
</head>

<body>
  <div class="floating-particles"></div>
  <div data-include="header"></div>

  <div class="wrap">

    <section class="hero animate-fade-in-up">
      <div style="text-align: center;">
        <h1 class="gradient-text">12thFailJobs</h1>
        <p data-i18n="hero_tagline">Empowering India's Real Workforce</p>

        <!-- 🌍 Language Dropdown -->
        <div class="lang-box">
          <select id="langSelect" onchange="I18N.loadLanguage(this.value)">
            <option value="english">🇬🇧 English</option>
            <option value="hindi">🇮🇳 हिन्दी</option>
            <option value="bengali">🇧🇩 বাংলা</option>
            <option value="gujarati">🇮🇳 ગુજરાતી</option>
            <option value="kannada">🇮🇳 ಕನ್ನಡ</option>
            <option value="malayalam">🇮🇳 മലയാളം</option>
            <option value="marathi">🇮🇳 मराठी</option>
            <option value="odia">🇮🇳 ଓଡ଼ିଆ</option>
            <option value="punjabi">🇮🇳 ਪੰਜਾਬੀ</option>
            <option value="tamil">🇮🇳 தமிழ்</option>
            <option value="telugu">🇮🇳 తెలుగు</option>
            <option value="assamese">🇮🇳 অসমীয়া</option>
          </select>
        </div>
      </div>
    </section>

    <div class="section-chooser">
      <h2 class="section-title" data-i18n="choose_path">
        Choose Your Path
      </h2>

      <div class="role-cards">
        <a href="worker/login.html" class="role-card worker">
          <span class="role-icon">👷</span>
          <h3 class="role-title" data-i18n="worker_title">
            I am a Worker
          </h3>
          <p class="role-description" data-i18n="worker_desc">
            Find nearby jobs easily and start working today
          </p>
          <div class="role-features">
            <span class="role-feature" data-i18n="feature_apply">
              ⚡ Simple Apply
            </span>
            <span class="role-feature" data-i18n="feature_call">
              📞 Direct Call
            </span>
            <span class="role-feature" data-i18n="feature_quick">
              ⚡ Quick Jobs
            </span>
          </div>
        </a>

        <a href="recruiter/login.html" class="role-card recruiter">
          <span class="role-icon">👔</span>
          <h3 class="role-title" data-i18n="recruiter_title">
            I am a Recruiter
          </h3>
          <p class="role-description" data-i18n="recruiter_desc">
            Hire trusted workers fast and grow your business
          </p>
          <div class="role-features">
            <span class="role-feature" data-i18n="feature_post">
              📝 Post Jobs
            </span>
            <span class="role-feature" data-i18n="feature_manage">
              👥 Manage Applications
            </span>
            <span class="role-feature" data-i18n="feature_hire">
              🎯 Hire Smart
            </span>
          </div>
        </a>
      </div>
    </div>
  </div>
  <div data-include="footer"></div>

  <script src="js/partials-unified.js"></script>
  <script>
    // Mobile Navigation Toggle
    document.addEventListener('DOMContentLoaded', function() {
      const navToggle = document.getElementById('navToggle');
      const navMenu = document.getElementById('navMenu');
      
      if (navToggle && navMenu) {
        navToggle.addEventListener('click', function() {
          navMenu.classList.toggle('open');
        });
        
        // Close menu when clicking outside
        document.addEventListener('click', function(event) {
          if (!navToggle.contains(event.target) && !navMenu.contains(event.target)) {
            navMenu.classList.remove('open');
          }
        });
      }
    });

    (async function(){
      await loadLangRoot();   // root page loader
      applyI18n();

      const sel = document.getElementById("langSelect");
      sel.value = getLang();
      sel.addEventListener("change", () => setLang(sel.value));
      
      // Initialize language buttons
      updateLanguageButtons(getLang());
      updatePageLanguage(getLang());
    })();
  </script>
  <script>
    // Scroll Reveal Animation
    function reveal() {
      const reveals = document.querySelectorAll('.reveal');
      
      reveals.forEach(element => {
        const windowHeight = window.innerHeight;
        const elementTop = element.getBoundingClientRect().top;
        const elementVisible = 150;
        
        if (elementTop < windowHeight - elementVisible) {
          element.classList.add('active');
        }
      });
    }
    
    window.addEventListener('scroll', reveal);
    reveal(); // Call once on load
    
    // Tab switching logic for Login/Register
    const tabs = document.querySelectorAll('.auth-tab');
    const panels = document.querySelectorAll('.auth-panel');

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        // Remove active class from all tabs and panels
        tabs.forEach(t => t.classList.remove('active'));
        panels.forEach(p => p.classList.remove('active'));

        // Add active class to the clicked tab and its matching panel
        tab.classList.add('active');
        document.getElementById(tab.dataset.tab + 'Panel').classList.add('active');
      });
    });
  </script>
</body>
</html>
